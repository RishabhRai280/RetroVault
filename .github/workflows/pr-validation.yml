name: PR Validation

on:
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Type Check & Lint
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download the code from the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Install pnpm (the package manager)
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      # Step 3: Install Node.js (the environment needed to run the project)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm" # This enables caching automatically

      # Step 4: Install all dependencies
      # --frozen-lockfile means: use exact versions from pnpm-lock.yaml, don't change anything
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Step 5: Run type checking
      # This checks if variables and functions are used correctly
      - name: Type Check
        run: pnpm tsc --noEmit

      # Step 6: Run linting
      # This checks if the code follows the team's style rules
      - name: Lint
        run: pnpm eslint .

      # Step 7: Placeholder for tests (to be added later)
      # - name: Run Tests
      #   run: pnpm test
